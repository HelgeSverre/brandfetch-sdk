name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.2, 8.3]
        laravel: [11, 12]
        include:
          - laravel: 11
            testbench: ^9.0
          - laravel: 12
            testbench: ^10.0
          - laravel: 13
            php: 8.4
            testbench: ^11.0
            pest: ^4.0
            pest_laravel: ^4.0
            pest_arch: ^4.0

    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, json, mbstring
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/contracts:^${{ matrix.laravel }}.0" --no-update
          composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-update
          composer require "pestphp/pest:${{ matrix.pest || '^3.0' }}" --dev --no-update
          composer require "pestphp/pest-plugin-laravel:${{ matrix.pest_laravel || '^3.0' }}" --dev --no-update
          composer require "pestphp/pest-plugin-arch:${{ matrix.pest_arch || '^3.0' }}" --dev --no-update
          composer update --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/pest --no-coverage
